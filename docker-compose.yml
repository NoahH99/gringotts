services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gringotts
      POSTGRES_USER: gringotts
      POSTGRES_PASSWORD: gringotts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gringotts"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
